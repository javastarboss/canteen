<script type="module" src="java/cash.js"></script>
<script type="module" >

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  getDocs,
  setDoc,
  query,
  where,
  updateDoc,
increment,
  
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgcibxEec8dwJb4TZuQrmeoUM3pjylrBk",
  authDomain: "food-canteen-app-77e31.firebaseapp.com",
  projectId: "food-canteen-app-77e31"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const stores = getFirestore(app);





onAuthStateChanged(auth, async (user) => {
  if (user) {
    const userDocRef = doc(stores, 'users', user.uid);
    const userDoc = await getDoc(userDocRef);

    if (userDoc.exists()) {
      document.body.style.display = "block";
      
      const cart = userDoc.data().cart;
      if (typeof display === "function") display(cart);
    } else {
      window.location.href = 'adminlogin.html';
    }
  } else {
 
    window.location.href = 'login.html';
  }
});
</script>
